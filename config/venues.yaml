# Venue list. One playlist is maintained per venue.
#
# Fields per venue:
#   name                  display name
#   slug                  stable id (used for cover-art filenames, etc.)
#   source                "ticketmaster" | "scrape"  (where to read the calendar)
#   ticketmaster_venue_id required when source == ticketmaster
#   calendar_url          the venue's public calendar (scrape source, and shown on the page)
#   spotify_playlist_id   filled in automatically after the first run (do not hand-edit)
#
# tracks_per_artist and max_tracks can be overridden per venue if needed.

defaults:
  tracks_per_artist: 3
  max_tracks: 50
  lookahead_days: 120

cities:
  - name: San Francisco
    timezone: America/Los_Angeles
    venues:
      - name: The Independent
        slug: the-independent-sf
        source: ticketmaster
        ticketmaster_venue_id: KovZpZAAl7AA
        calendar_url: https://www.theindependentsf.com/

